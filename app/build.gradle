dependencies {
    applyBasicDependencies(this.dependencies)
    applyKotlinDependencies(this.dependencies)
    applyComposeDependencies(this.dependencies)

    implementation project(path: ':richard-context')
    implementation project(path: ':richard-basic')
    implementation project(path: ':richard-compose-widget')
    implementation project(path: ':richard-permission')
    implementation project(path: ':richard-security')
    implementation project(path: ':richard-printer')
    implementation project(path: ':richard-port-connect')
    implementation project(path: ':richard-media-selector')
    implementation project(path: ':richard-net')
    implementation project(path: ':richard-simple-rx')
    implementation project(path: ':richard-bluetooth')
    implementation project(path: ':richard-log')

    //refresh-header
    implementation 'io.github.scwang90:refresh-header-material:2.1.1'

    //dpi适配
    implementation 'me.jessyan:autosize:1.2.1'

    //ARouter(界面路由)
    implementation 'com.alibaba:arouter-api:1.5.2'
    annotationProcessor 'com.alibaba:arouter-compiler:1.5.2'

    annotationProcessor 'com.github.bumptech.glide:compiler:5.0.7'
    annotationProcessor "com.github.permissions-dispatcher:permissionsdispatcher-processor:4.9.2"

    //rabitmq
    implementation 'com.rabbitmq:amqp-client:5.12.0'

    //mqtt
    implementation 'org.eclipse.paho:org.eclipse.paho.client.mqttv3:1.2.2'
    implementation 'org.eclipse.paho:org.eclipse.paho.android.service:1.1.1'

    debugImplementation 'com.squareup.leakcanary:leakcanary-android:3.0-alpha-1'
}