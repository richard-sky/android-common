    namespace = 'com.richard.dev.common'
    compileSdk = buildConfigs.compileSdk

    defaultConfig {
        applicationId = "com.richard.dev.common"
        minSdk = buildConfigs.minSdk
        targetSdk = buildConfigs.targetSdk
        versionCode = 1
        versionName = "1.0"
        multiDexEnabled = true

        testInstrumentationRunner = "androidx.test.runner.AndroidJUnitRunner"

        //Arouter
        javaCompileOptions {
            annotationProcessorOptions {
                arguments = [AROUTER_MODULE_NAME: project.getName()]
            }
        }

        ndk {
            rootProject.ext.abiFilters.each { abiFilters it }
        }
    }

    sourceSets {
        main {
            res.srcDirs('src/main/res', 'src/main/res_core')
        }
    }

    //签名配置
    signingConfigs {
        debugConfig {
            keyAlias = "common"
            keyPassword = "123456"
            storeFile = file("./apk_sign.jks")
            storePassword = "123456"
        }
        releaseConfig {
            keyAlias = "common"
            keyPassword = "123456"
            storeFile = file("./apk_sign.jks")
            storePassword = "123456"
        }
        debug {
            enableV1Signing = true
            enableV2Signing = true
            enableV3Signing = true
            enableV4Signing = true
        }
        release {
            enableV1Signing = true
            enableV2Signing = true
            enableV3Signing = true
            enableV4Signing = true
        }
    }

    buildTypes {
        debug {
            signingConfig = signingConfigs.debugConfig
            minifyEnabled = false
            zipAlignEnabled = false
            shrinkResources = false
            debuggable = true
            jniDebuggable = true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }

        release {
            signingConfig = signingConfigs.releaseConfig
            minifyEnabled = false
            zipAlignEnabled = false
            shrinkResources = false
            debuggable = false
            jniDebuggable = false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        //标志启用对新语言api的支持
        coreLibraryDesugaringEnabled = true

        sourceCompatibility = buildConfigs.sourceCompatibility
        targetCompatibility = buildConfigs.targetCompatibility
    }

    buildFeatures {
        buildConfig = true
        viewBinding = true
        dataBinding = true
        compose = true
    }

